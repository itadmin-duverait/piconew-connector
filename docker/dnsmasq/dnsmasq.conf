# PicoNew Connector — dnsmasq config
# Replace CONNECTOR_IP_PLACEHOLDER with your machine's LAN IP (same as CONNECTOR_IP in .env)

address=/picobrew.com/CONNECTOR_IP_PLACEHOLDER
address=/.picobrew.com/CONNECTOR_IP_PLACEHOLDER

# Upstream DNS for everything else
server=1.1.1.1
server=8.8.8.8

log-queries
