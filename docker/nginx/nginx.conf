events {}

http {
  server {
    listen 443 ssl;
    server_name picobrew.com *.picobrew.com;

    ssl_certificate     /etc/nginx/certs/picobrew.crt;
    ssl_certificate_key /etc/nginx/certs/picobrew.key;

    # PicoBrew devices do not verify TLS — self-signed cert works fine
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 5m;

    location / {
      proxy_pass         http://connector-service:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 30s;
    }
  }
}
