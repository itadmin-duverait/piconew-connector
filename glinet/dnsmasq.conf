# PicoNew Connector — GL.iNet dnsmasq config
# Replace PICONEW_IP with the result of: dig +short piconew.com
# (or nslookup piconew.com — use the first IP returned)

address=/picobrew.com/PICONEW_IP
address=/.picobrew.com/PICONEW_IP

# Use Cloudflare as upstream for everything else
server=1.1.1.1
server=8.8.8.8
